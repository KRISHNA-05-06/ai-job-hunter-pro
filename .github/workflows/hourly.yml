name: AI Job Hunter Pro — Hourly

on:
  schedule:
    # Every hour 6am–10pm EST (UTC-5 = +5hrs offset)
    # 6am  EST = 11:00 UTC
    # 10pm EST = 03:00 UTC next day
    - cron: "0 11 * * *"   # 6am  EST
    - cron: "0 12 * * *"   # 7am  EST
    - cron: "0 13 * * *"   # 8am  EST
    - cron: "0 14 * * *"   # 9am  EST
    - cron: "0 15 * * *"   # 10am EST
    - cron: "0 16 * * *"   # 11am EST
    - cron: "0 17 * * *"   # 12pm EST
    - cron: "0 18 * * *"   # 1pm  EST
    - cron: "0 19 * * *"   # 2pm  EST
    - cron: "0 20 * * *"   # 3pm  EST
    - cron: "0 21 * * *"   # 4pm  EST
    - cron: "0 22 * * *"   # 5pm  EST
    - cron: "0 23 * * *"   # 6pm  EST
    - cron: "0 0  * * *"   # 7pm  EST
    - cron: "0 1  * * *"   # 8pm  EST
    - cron: "0 2  * * *"   # 9pm  EST
    - cron: "0 3  * * *"   # 10pm EST

  workflow_dispatch:        # manual trigger from GitHub UI anytime

jobs:
  hunt:
    name: Scrape → Score → Notify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          APIFY_API_TOKEN:    ${{ secrets.APIFY_API_TOKEN }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: python main.py

      - name: Upload job results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-results-${{ github.run_number }}
          path: data/
          retention-days: 7
